name: MLflow Training Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "mlflow==2.19.0" \
            "pandas>=2.1,<3" \
            "numpy>=1.26,<3" \
            "scikit-learn==1.5.2" \
            "matplotlib>=3.8,<4" \
            "joblib>=1.3"

      - name: Build preprocessed dataset
        run: |
          python preprocessing/automate_Zacky_Muhammad_Dinata.py

      - name: Run MLflow Project
        working-directory: Workflow-CI/MLProject
        run: |
          mlflow run . -e train \
            -P data_path=Students_Social_Media_Addiction_preprocessing.csv \
            -P schema_path=preprocessing_schema.json \
            -P experiment_name=workflow-ci-social-media-addiction \
            -P model_output=artifacts/social_media_addiction_model.joblib \
            --env-manager=local

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            Workflow-CI/MLProject/mlruns
            Workflow-CI/MLProject/artifacts
